services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: rag-server-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    container_name: rag-server-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CANONDOCK_API_BASE_URL=${CANONDOCK_API_BASE_URL:-http://host.docker.internal:8020}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant

  mcp:
    build: .
    container_name: rag-server-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RAG_API_BASE_URL=http://api:8000
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8081
      - MCP_REQUEST_TIMEOUT=30
    command: ["python", "-m", "mcp_server.server"]
    ports:
      - "8081:8081"
    depends_on:
      - api

volumes:
  qdrant_data:
