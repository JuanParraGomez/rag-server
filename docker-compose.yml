services:
  api:
    build: .
    container_name: rag-server-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ./:/app

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: rag-server-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
